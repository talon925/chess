<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Šah</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #36393f; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #container { display: flex; flex-direction: column; align-items: center; gap: 16px; }
        canvas { border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.6); cursor: pointer; }
        #status { color: #fff; font-size: 20px; font-weight: 600; text-align: center; background: rgba(0,0,0,0.3); padding: 12px 24px; border-radius: 8px; min-width: 300px; }
        #players { color: #b9bbbe; font-size: 14px; text-align: center; }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="board" width="480" height="480"></canvas>
        <div id="status">Učitavanje...</div>
        <div id="players"></div>
    </div>
<script>
// ==================== DISCORD SDK ====================
let discordSdk = null;
let myUserId = null;
let myPlayerNumber = null;
let participants = [];
let instanceId = null;

async function setupDiscord() {
    try {
        const { DiscordSDK } = window.discordSdk || {};
        if (!DiscordSDK) { showStatus('Discord SDK nije učitan'); return; }

        // ZAMENI SA NOVIM APPLICATION ID
        discordSdk = new DiscordSDK('1514311922265227356');
        await discordSdk.ready();

        const { user } = await discordSdk.commands.authenticate();
        myUserId = user.id;

        const instance = await discordSdk.commands.getInstanceConnectedParticipants();
        instanceId = instance.instanceId;
        updateParticipants(instance.participants);

        discordSdk.subscribe('ACTIVITY_INSTANCE_PARTICIPANTS_UPDATE', (data) => {
            updateParticipants(data.participants);
        });

        discordSdk.subscribe('MESSAGE_CREATE', (event) => {
            if (event.message.type === 'CHESS_MOVE') {
                handleOpponentMove(event.message.data);
            }
        });

        showStatus('✅ Povezan! Čekam drugog igrača...');
        drawBoard();

    } catch (e) {
        console.error(e);
        showStatus('Greška pri povezivanju');
    }
}

function updateParticipants(list) {
    participants = list;
    document.getElementById('players').innerText = 'Igrači: ' + list.length;
    if (list.length >= 2 && myPlayerNumber === null) {
        if (list[0].id === myUserId) { myPlayerNumber = 0; showStatus('Ti si BELI. Na potezu si!'); }
        else if (list[1].id === myUserId) { myPlayerNumber = 1; showStatus('Ti si CRNI. Čekaj potez...'); }
        else { showStatus('Posmatrač'); }
        drawBoard();
    }
}

async function sendMove(data) {
    if (!discordSdk) return;
    await discordSdk.commands.sendMessage({ type: 'CHESS_MOVE', data, instanceId });
}

function handleOpponentMove(data) {
    game.move(data);
    selectedSquare = null;
    possibleMoves = [];
    drawBoard();
    updateStatus();
}

function showStatus(text) {
    document.getElementById('status').innerText = text;
}

// ==================== ŠAHOVSKA LOGIKA ====================
const game = new Chess();
let selectedSquare = null;
let possibleMoves = [];

function isMyTurn() {
    if (myPlayerNumber === null) return false;
    return (myPlayerNumber === 0 && game.turn() === 'w') || (myPlayerNumber === 1 && game.turn() === 'b');
}

function updateStatus() {
    if (game.isGameOver()) {
        if (game.isCheckmate()) showStatus('🏆 ŠAH-MAT!');
        else if (game.isStalemate()) showStatus('🤝 PAT!');
        else showStatus('🤝 REMI!');
    } else {
        const t = game.turn() === 'w' ? 'BELI' : 'CRNI';
        showStatus((game.isCheck() ? '⚠️ ŠAH! ' : '') + t + ' je na potezu');
    }
}

// ==================== CRTANJE ====================
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const S = 60;
const light = '#f0d9b5', dark = '#b58863';

const symbols = { p:'♟',r:'♜',n:'♞',b:'♝',q:'♛',k:'♚',P:'♙',R:'♖',N:'♘',B:'♗',Q:'♕',K:'♔' };

function drawBoard() {
    ctx.clearRect(0,0,480,480);
    for (let r=0;r<8;r++) for (let c=0;c<8;c++) {
        ctx.fillStyle = (r+c)%2===0 ? light : dark;
        ctx.fillRect(c*S,r*S,S,S);
    }
    if (game.isCheck()) {
        const b = game.board();
        for (let r=0;r<8;r++) for (let c=0;c<8;c++) {
            if (b[r][c] && b[r][c].type==='k' && b[r][c].color===game.turn()) {
                ctx.fillStyle = 'rgba(255,0,0,0.5)';
                ctx.fillRect(c*S,r*S,S,S);
            }
        }
    }
    if (selectedSquare) {
        ctx.fillStyle = 'rgba(255,255,0,0.6)';
        ctx.fillRect(selectedSquare.col*S,selectedSquare.row*S,S,S);
    }
    for (const m of possibleMoves) {
        ctx.beginPath();
        ctx.arc(m.col*S+S/2,m.row*S+S/2,16,0,Math.PI*2);
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.fill();
    }
    const b = game.board();
    for (let r=0;r<8;r++) for (let c=0;c<8;c++) {
        const p = b[r][c];
        if (p) {
            const sym = symbols[p.color==='w'?p.type.toUpperCase():p.type];
            ctx.font = 'bold 44px "Segoe UI",Arial,sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillText(sym,c*S+S/2+1,r*S+S/2+1);
            ctx.fillStyle = p.color==='w'?'#fff':'#1a1a1a';
            ctx.fillText(sym,c*S+S/2,r*S+S/2);
        }
    }
}

// ==================== KLIK ====================
canvas.addEventListener('click', (e) => {
    if (!isMyTurn()) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = 480/rect.width, scaleY = 480/rect.height;
    const col = Math.floor((e.clientX-rect.left)*scaleX/S);
    const row = Math.floor((e.clientY-rect.top)*scaleY/S);
    if (col<0||col>7||row<0||row>7) return;
    const sq = String.fromCharCode(97+col)+(8-row);

    if (!selectedSquare) {
        const piece = game.get(sq);
        if (piece && piece.color===game.turn()) {
            selectedSquare = {row,col};
            possibleMoves = game.moves({square:sq,verbose:true}).map(m=>({row:8-parseInt(m.to[1]),col:m.to.charCodeAt(0)-97}));
        }
    } else {
        const from = String.fromCharCode(97+selectedSquare.col)+(8-selectedSquare.row);
        try {
            const result = game.move({from,to:sq,promotion:'q'});
            if (result) {
                sendMove({from,to:sq,promotion:'q'});
                selectedSquare = null; possibleMoves = [];
                drawBoard(); updateStatus();
            } else { selectedSquare = null; possibleMoves = []; }
        } catch(_) { selectedSquare = null; possibleMoves = []; }
    }
    drawBoard();
});

// ==================== POKRETANJE ====================
setupDiscord();
drawBoard();
updateStatus();
</script>
</body>
</html>
